<!DOCTYPE html>
<html>
<head>

<title>About</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:40px;

font-family:Arial,sans-serif;

background:
linear-gradient(
135deg,
#4facfe,
#00c6ff,
#6a5cff
);

overflow-x:hidden;
position:relative;
}

/* background circles */

body::before{

content:"";

position:fixed;

width:350px;
height:350px;

border-radius:50%;

top:-120px;
left:-80px;

background:
rgba(255,255,255,.15);

filter:blur(10px);

}

body::after{

content:"";

position:fixed;

width:420px;
height:420px;

bottom:-160px;
right:-120px;

border-radius:50%;

background:
rgba(255,255,255,.1);

filter:blur(15px);

}

.about-box{

width:700px;

padding:40px;

border-radius:30px;

background:
rgba(255,255,255,.16);

backdrop-filter:
blur(18px);

border:
1px solid
rgba(255,255,255,.25);

box-shadow:
0 10px 35px
rgba(
0,
0,
0,
0.25
);

color:white;

}

h1{

margin-top:0;

font-size:42px;

}

p{

line-height:1.7;

opacity:.95;

}

.section{

margin-top:25px;

padding:20px;

border-radius:20px;

background:
rgba(
255,
255,
255,
0.12
);

}

.back-btn{

position:fixed;

top:20px;
left:20px;

padding:
12px 22px;

border-radius:15px;

text-decoration:none;

font-weight:bold;

color:white;

background:
linear-gradient(
45deg,
#2f80ed,
#56ccf2
);

box-shadow:
0 5px 20px
rgba(
0,
0,
0,
0.2
);

transition:.25s;

}

.back-btn:hover{

transform:
scale(1.08);

}

</style>
</head>

<body>

<a href="index.html" class="back-btn">

← Back

</a>

<div class="about-box">

<h1>

About This Website

</h1>

<p>

Replace this text with information about your Geometry Dash Skillset Browser.

</p>

<div class="section">

<h2>

Website Information

</h2>

<p>

Creator: YOUR NAME

<br><br>

Started: DATE

<br><br>

Purpose: Explain your website here.

</p>

</div>

<div class="section">

<h2>

Credits

</h2>

<p>

Add credits here.

</p>

</div>

<div class="section">

<h2>

Updates

</h2>

<p>

Version 1.0 — Initial release

</p>

</div>

</div>

</body>
</html>
